version: "3.9"

# Loocbooc Pipeline Worker Stack
# Run: docker compose -f worker-compose.yml up
# Scale workers: docker compose -f worker-compose.yml up --scale pipeline-worker=3

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  pipeline-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      celery -A pipeline.workers.celery_worker worker
      -Q pipeline
      -c 2
      --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - STORAGE_BUCKET=loocbooc-garments
      # AWS credentials (use secrets in production)
      # - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      # - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      # - AWS_DEFAULT_REGION=ap-southeast-2
    volumes:
      - pipeline_work:/tmp/loocbooc_pipeline
      - ./pipeline:/app/pipeline  # Hot reload in dev
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  flower:
    image: mher/flower:2.0
    command: celery flower --broker=redis://redis:6379/0 --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0

  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    profiles:
      - debug

volumes:
  redis_data:
  pipeline_work:
