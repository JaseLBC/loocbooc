version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://loocbooc:loocbooc@postgres:5432/loocbooc
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      - DEBUG=true
      - SECRET_KEY=dev-secret-key-change-in-production-32chars
      - STORAGE_BACKEND=local
      - LOCAL_STORAGE_PATH=/tmp/loocbooc-storage
      # Set your Anthropic API key for real OCR
      # - ANTHROPIC_API_KEY=sk-ant-...
    volumes:
      - ./app:/app/app  # Live reload in dev
      - loocbooc_storage:/tmp/loocbooc-storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "
        echo 'Waiting for DB...' &&
        python -c 'import asyncio; import asyncpg; asyncio.run(asyncpg.connect(\"postgresql://loocbooc:loocbooc@postgres:5432/loocbooc\"))' &&
        echo 'Running migrations...' &&
        alembic upgrade head &&
        echo 'Starting API...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: loocbooc
      POSTGRES_USER: loocbooc
      POSTGRES_PASSWORD: loocbooc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loocbooc -d loocbooc"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  loocbooc_storage:
