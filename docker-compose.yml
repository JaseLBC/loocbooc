# ================================================================
# Loocbooc — Full Stack Docker Compose
# ================================================================
# TypeScript Monorepo: apps/api (Fastify), apps/web (Next.js),
# apps/worker (BullMQ)
#
# Services: postgres, redis, minio, api, web, worker
#
# Usage:
#   docker-compose up            # Start all services
#   docker-compose up --build    # Rebuild and start
#   docker-compose logs -f api   # Follow API logs
#   docker-compose exec api sh   # Shell into API container
# ================================================================

services:

  # ── Postgres 16 ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: loocbooc
      POSTGRES_PASSWORD: loocbooc_dev_password
      POSTGRES_DB: loocbooc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loocbooc -d loocbooc"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s
    ports:
      - "5432:5432"

  # ── Redis 7 ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    ports:
      - "6379:6379"

  # ── MinIO (S3-compatible object storage) ────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "9000:9000"
      - "9001:9001"

  # ── MinIO Init (create bucket) ───────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        echo 'Creating MinIO bucket...' &&
        mc alias set myminio http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing myminio/loocbooc-dev &&
        mc anonymous set download myminio/loocbooc-dev &&
        echo 'Bucket loocbooc-dev ready. Done.'
      "
    restart: "no"

  # ── Prisma Migrate (run migrations before API starts) ────────
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder
    command: >
      sh -c "
        cd packages/database &&
        npx prisma migrate deploy &&
        echo 'Migrations complete.'
      "
    environment:
      DATABASE_URL: postgresql://loocbooc:loocbooc_dev_password@postgres:5432/loocbooc
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Fastify API Server ───────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: postgresql://loocbooc:loocbooc_dev_password@postgres:5432/loocbooc
      # Redis (BullMQ queues + cache)
      REDIS_URL: redis://redis:6379/0
      # Supabase (Auth) — replace with real values for production
      SUPABASE_URL: ${SUPABASE_URL:-https://your-project.supabase.co}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-your-anon-key}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-your-service-role-key}
      # Stripe
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      # Shopify
      SHOPIFY_API_KEY: ${SHOPIFY_API_KEY:-placeholder}
      SHOPIFY_API_SECRET: ${SHOPIFY_API_SECRET:-placeholder}
      # S3 / MinIO
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: loocbooc-dev
      S3_REGION: us-east-1
      # General
      NODE_ENV: development
      PORT: 8000
      API_URL: http://localhost:8000
      WEB_URL: http://localhost:3000
      INTERNAL_SERVICE_SECRET: dev-internal-secret-change-in-production
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Next.js Frontend ─────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL:-https://your-project.supabase.co}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-your-anon-key}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-pk_test_placeholder}
      NODE_ENV: development
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"

  # ── BullMQ Worker ────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: postgresql://loocbooc:loocbooc_dev_password@postgres:5432/loocbooc
      # Redis (BullMQ queues)
      REDIS_URL: redis://redis:6379/0
      # Stripe (for payment captures)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      # Resend (email notifications)
      RESEND_API_KEY: ${RESEND_API_KEY:-re_placeholder}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@loocbooc.com}
      # Shopify (for order sync)
      SHOPIFY_API_KEY: ${SHOPIFY_API_KEY:-placeholder}
      SHOPIFY_API_SECRET: ${SHOPIFY_API_SECRET:-placeholder}
      # General
      NODE_ENV: development
      API_URL: http://api:8000
      WEB_URL: http://localhost:3000
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Worker has no HTTP port — monitors BullMQ queues

volumes:
  postgres_data:
  minio_data:

# ================================================================
# Quick Reference
# ================================================================
# Start:           docker-compose up
# Start + rebuild: docker-compose up --build
# Stop:            docker-compose down
# Logs:            docker-compose logs -f api
# Shell:           docker-compose exec api sh
# Prisma Studio:   docker-compose exec api npx prisma studio
# ================================================================
