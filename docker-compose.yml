version: '3.8'

# ================================================================
# Loocbooc MVP — Full Stack Docker Compose
# ================================================================
# Services: postgres, redis, minio, minio-init, api, web, pipeline-worker
#
# Usage:
#   docker-compose up            # Start all services
#   docker-compose up --build    # Rebuild and start
#   docker-compose exec api python /app/scripts/seed.py  # Re-run seed
#   docker-compose logs -f api   # Follow API logs
# ================================================================

services:

  # ── Postgres 16 ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: loocbooc
      POSTGRES_PASSWORD: loocbooc
      POSTGRES_DB: loocbooc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loocbooc -d loocbooc"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s
    ports:
      - "5432:5432"

  # ── Redis 7 ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    ports:
      - "6379:6379"

  # ── MinIO (S3-compatible object storage) ────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "9000:9000"
      - "9001:9001"

  # ── MinIO Init (create bucket) ───────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        echo 'Creating MinIO bucket...' &&
        mc alias set myminio http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing myminio/loocbooc-dev &&
        mc anonymous set download myminio/loocbooc-dev &&
        echo 'Bucket loocbooc-dev ready. Done.'
      "
    restart: "no"

  # ── FastAPI Backend ──────────────────────────────────────────
  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      sh -c "
        echo 'Running migrations...' &&
        alembic upgrade head &&
        echo 'Running seed...' &&
        python /app/scripts/seed.py ||
        echo 'Seed skipped (already seeded or error, continuing)' &&
        echo 'Starting API server...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
      "
    environment:
      DATABASE_URL: postgresql+asyncpg://loocbooc:loocbooc@postgres:5432/loocbooc
      REDIS_URL: redis://redis:6379/0
      STORAGE_BACKEND: minio
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: loocbooc-dev
      SECRET_KEY: dev-secret-change-in-production-32-chars-minimum
      JWT_SECRET: dev-secret-change-in-production
      ENVIRONMENT: development
      DEBUG: "true"
      API_KEY_PREFIX: lb_live_
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Next.js Frontend ─────────────────────────────────────────
  web:
    build:
      context: ./packages/web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NODE_ENV: development
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"

  # ── Celery Pipeline Worker ───────────────────────────────────
  pipeline-worker:
    build:
      context: ./packages/pipeline
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      API_BASE_URL: http://api:8000
      PIPELINE_API_KEY: lb_live_testkey_charcoal
      STORAGE_BACKEND: minio
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: loocbooc-dev
      PYTHONUNBUFFERED: "1"
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - pipeline_tmp:/tmp/loocbooc_pipeline

volumes:
  postgres_data:
  minio_data:
  pipeline_tmp:
